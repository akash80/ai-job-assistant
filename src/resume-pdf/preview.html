<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailored Resume Preview</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #475569;
      --rule: #e2e8f0;
      --accent: #4f46e5;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .page {
      width: 816px; /* ~8.5in @ 96dpi */
      margin: 0 auto;
      padding: 48px 56px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
    }
    .headline {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13.5px;
    }
    .contact {
      text-align: right;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-line;
    }
    .rule {
      height: 1px;
      background: var(--rule);
      margin: 14px 0 18px;
    }
    .section {
      margin: 16px 0;
    }
    .sectionTitle {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 0 0 10px;
      font-weight: 700;
    }
    ul {
      margin: 0;
      padding-left: 18px;
    }
    li {
      margin: 4px 0;
      color: var(--ink);
      font-size: 13.25px;
      line-height: 1.45;
    }
    .skillsGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 18px;
    }
    .skillCat {
      font-size: 12.5px;
      color: var(--muted);
    }
    .skillCat strong {
      color: var(--ink);
    }
    .role {
      margin-top: 12px;
    }
    .roleHead {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
    }
    .roleTitle {
      font-size: 14px;
      font-weight: 700;
      margin: 0;
    }
    .roleMeta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .roleDates {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .smallNote {
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
    }
    @media print {
      .page { margin: 0; width: auto; padding: 36px 44px; }
    }
  </style>
</head>
<body>
  <div class="page" id="root"></div>
  <script src="preview.js"></script>
</body>
</html>
